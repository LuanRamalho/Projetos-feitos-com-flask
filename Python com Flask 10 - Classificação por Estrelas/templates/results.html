<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        h1 { color: #333; text-align: center; margin-bottom: 10px; font-weight: 600; }
        
        .summary { text-align: center; color: #666; margin-bottom: 30px; font-size: 16px; }
        .summary span.avg { font-size: 42px; font-weight: bold; color: #333; display: block; margin-bottom: 5px;}
        
        .rating-row { display: flex; align-items: center; margin-bottom: 15px; }
        .star-label { width: 45px; font-weight: 600; color: #555; font-size: 15px;}
        
        .bar-container { flex-grow: 1; background-color: #f0f0f0; border-radius: 4px; height: 12px; margin: 0 15px; overflow: hidden; }
        .bar { height: 100%; background-color: #ffc107; width: 0; border-radius: 4px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .stats { width: 90px; text-align: right; font-size: 14px; color: #777; font-weight: 500;}
        
        .btn-back { display: block; text-align: center; margin-top: 30px; color: #007bff; text-decoration: none; font-weight: 600; transition: color 0.2s;}
        .btn-back:hover { color: #0056b3; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Resultados</h1>
        <div class="summary">
            <span class="avg">{{ average }}</span>
            <span style="color: #ffc107; font-size: 24px;">★</span><br>
            {{ total }} avaliações no total
        </div>

        <div id="ratings-container"></div>

        <a href="/" class="btn-back">← Voltar para Votação</a>
    </div>

    <script>
        // Recebe o dicionário do Flask e converte para um objeto JS de forma segura
        const stats = {{ stats | tojson | safe }};
        const container = document.getElementById('ratings-container');
        
        // Loop de 5 até 1 para mostrar as 5 estrelas no topo
        for (let i = 5; i >= 1; i--) {
            const data = stats[i];
            
            const row = document.createElement('div');
            row.className = 'rating-row';
            
            // Rótulo da estrela (ex: "5 ★")
            const label = document.createElement('div');
            label.className = 'star-label';
            label.innerText = i + ' ★';
            
            // Container da barra de progresso
            const barContainer = document.createElement('div');
            barContainer.className = 'bar-container';
            
            // A barra colorida
            const bar = document.createElement('div');
            bar.className = 'bar';
            
            // Anima a barra ajustando a largura após a renderização inicial
            setTimeout(() => {
                bar.style.width = data.percentage + '%';
            }, 50);
            
            barContainer.appendChild(bar);
            
            // Texto da porcentagem e contagem
            const statText = document.createElement('div');
            statText.className = 'stats';
            statText.innerText = data.percentage + '% (' + data.count + ')';
            
            row.appendChild(label);
            row.appendChild(barContainer);
            row.appendChild(statText);
            
            container.appendChild(row);
        }
    </script>
</body>
</html>
