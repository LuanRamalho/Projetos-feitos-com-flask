<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificação</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #333; font-size: 24px; margin-bottom: 30px; font-weight: 600; }
        
        /* Lógica visual das estrelas reversas */
        .stars { display: flex; justify-content: center; flex-direction: row-reverse; gap: 5px; }
        .stars input { display: none; }
        .stars label { font-size: 50px; color: #e4e5e9; cursor: pointer; transition: color 0.2s ease-in-out; }
        .stars label:hover, 
        .stars label:hover ~ label, 
        .stars input:checked ~ label { color: #ffc107; }
        
        button { background-color: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 30px; width: 100%; transition: background 0.3s;}
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Avalie nosso serviço</h1>
        <form action="/vote" method="POST">
            <div class="stars">
                <input type="radio" name="star" id="star5" value="5" required><label for="star5">★</label>
                <input type="radio" name="star" id="star4" value="4"><label for="star4">★</label>
                <input type="radio" name="star" id="star3" value="3"><label for="star3">★</label>
                <input type="radio" name="star" id="star2" value="2"><label for="star2">★</label>
                <input type="radio" name="star" id="star1" value="1"><label for="star1">★</label>
            </div>
            <button type="submit">Enviar Avaliação</button>
        </form>
    </div>
</body>
</html>
