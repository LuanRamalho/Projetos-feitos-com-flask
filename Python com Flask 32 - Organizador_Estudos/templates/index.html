<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Organizador de Estudos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #F7FFF7; --primary: #4ECDC4; --dark: #1A535C; --text: #1A535C; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }
        nav { background: var(--dark); padding: 20px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { max-width: 900px; margin: 40px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/gerenciar">Gerenciar</a>
    </nav>
    <div class="container">
        <h1>📊 Seu Progresso</h1>
        <div style="height: 350px;">
            <canvas id="graficoProgresso"></canvas>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Matéria</th>
                    <th>Cumprido</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                {% for item in dados %}
                <tr>
                    <td><strong>{{ item.materia }}</strong></td>
                    <td>{{ item.horas_cumpridas }}</td>
                    <td>{{ item.horas_totais }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script>
        const ctx = document.getElementById('graficoProgresso').getContext('2d');
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: {{ materias|safe }},
                datasets: [{
                    label: 'Progresso (%)',
                    data: {{ percentuais|safe }},
                    backgroundColor: '#007BFF', 
                    borderRadius: 5,
                    borderSkipped: false,
                    barThickness: 35
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    // Tooltip para mostrar as 2 casas decimais ao passar o mouse
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `Progresso: ${context.raw.toFixed(2)}%`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        min: 0,
                        max: 100,
                        ticks: {
                            callback: function(value) {
                                return value.toFixed(2) + '%';
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
