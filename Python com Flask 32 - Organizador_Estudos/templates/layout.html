<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Estudos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --bg-color: #F7FFF7;
            --primary: #4ECDC4;
            --secondary: #FF6B6B;
            --accent: #FFE66D;
            --dark: #1A535C;
            --text-light: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--dark);
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: var(--dark);
            padding: 20px;
            text-align: center;
        }
        nav a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        nav a:hover { background-color: var(--primary); }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); /* Sombra suave típica do flat design */
        }
        h1, h2 { text-align: center; }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-danger { background-color: var(--secondary); }
        .btn-edit { background-color: var(--accent); color: var(--dark); }
        input[type="text"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            width: calc(100% - 28px);
            margin-bottom: 15px;
            font-size: 16px;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
            outline: none;
        }
        .flash {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
        .flash.sucesso { background-color: #d4edda; color: #155724; }
        .flash.erro { background-color: #f8d7da; color: #721c24; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #eee;
        }
        th { background-color: var(--primary); color: white; }
    </style>
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}">Dashboard</a>
        <a href="{{ url_for('gerenciar') }}">Gerenciar Matérias</a>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
