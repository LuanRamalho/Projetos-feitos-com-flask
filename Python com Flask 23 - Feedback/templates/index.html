<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback System</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary-color: #6c5ce7;
            --secondary-color: #00cec9;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { color: var(--primary-color); margin-bottom: 1rem; }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            resize: none;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus { border-color: var(--secondary-color); }

        button {
            margin-top: 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #5b4bc4;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #b2bec3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Seu Feedback</h1>
    <p>Conte-nos o que você está pensando...</p>
    
    <form action="/enviar" method="POST">
        <textarea name="feedback" placeholder="Escreva aqui..." required></textarea>
        <button type="submit">Enviar Feedback</button>
    </form>

    <div class="footer">
        Desenvolvido por Luan Ramalho, com python e flask
    </div>
</div>

</body>
</html>
