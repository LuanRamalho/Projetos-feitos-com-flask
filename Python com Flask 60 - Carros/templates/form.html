{% extends "base.html" %}
{% block content %}
<div class="card p-4">
    <h1 class="h4 mb-4">{{ title }}</h1>

    <form method="post">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Fabricante</label>
                <input type="text" class="form-control" name="fabricante" value="{{ car.fabricante }}" placeholder="Ex.: volkswagen" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Modelo</label>
                <input type="text" class="form-control" name="modelo" value="{{ car.modelo }}" placeholder="Ex.: fusca" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Ano de Lançamento</label>
                <input type="number" class="form-control" name="ano" value="{{ car.ano }}" placeholder="Ex.: 2024" required min="1900" max="2100">
            </div>
            <div class="col-md-4">
                <label class="form-label">Placa</label>
                <input type="text" class="form-control" name="placa" value="{{ car.placa }}" placeholder="Ex.: ABC1D23" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Cor</label>
                <input type="text" class="form-control" name="cor" value="{{ car.cor }}" placeholder="Ex.: azul" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Combustível</label>
                <select class="form-select" name="combustivel" required>
                    <option value="" disabled {{ 'selected' if not car.combustivel }}>Selecione...</option>
                    {% for opcao in ["Gasolina", "Etanol", "GNV", "Flex", "Elétrico", "Híbrido"] %}
                        <option value="{{ opcao }}" {{ 'selected' if car.combustivel == opcao }}>
                            {{ opcao }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-12">
                <label class="form-label">Link da imagem</label>
                <input type="url" class="form-control" name="link" value="{{ car.link }}" placeholder="https://..." required>
            </div>
            <div class="col-12 mt-4">
                <button class="btn btn-primary" type="submit">{{ button_text }}</button>
                <a class="btn btn-secondary" href="{{ url_for('index') }}">Voltar</a>
            </div>
        </div>
    </form>

    {% if car.link %}
    <hr class="my-4 border-light opacity-25">
    <h2 class="h6 mb-3">Prévia da imagem</h2>
    <img src="{{ car.link }}" class="car-thumb" alt="Prévia da imagem do carro">
    {% endif %}
</div>
{% endblock %}
