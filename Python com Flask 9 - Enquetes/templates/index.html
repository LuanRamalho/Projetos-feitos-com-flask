<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Enquetes - Home</title>
    <style>
        :root { --primary: #3498db; --bg: #f0f2f5; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { color: #2c3e50; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { 
            background: var(--card-bg); border-radius: 15px; padding: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; color: #34495e; min-height: 50px; }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn { 
            padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; 
            text-decoration: none; font-weight: 600; font-size: 14px; text-align: center; flex: 1;
        }
        .btn-vote { background-color: var(--primary); color: white; }
        .btn-res { background-color: #ecf0f1; color: #7f8c8d; }
        .btn-admin { background-color: #2ecc71; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Enquetes Disponíveis</h1>
            <a href="javascript:void(0)" onclick="autenticarAdmin()" class="btn btn-admin" style="flex: none;">+ Nova Enquete</a>
        </header>

        <div class="grid">
            {% for titulo in enquetes %}
            <div class="card">
                <h3>{{ titulo }}</h3>
                <div class="actions">
                    <a href="{{ url_for('votar', titulo=titulo) }}" class="btn btn-vote">Votar</a>
                    <a href="{{ url_for('resultados', titulo=titulo) }}" class="btn btn-res">Resultados</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
<script>
function autenticarAdmin() {
    let user = prompt("Acesso Restrito!\nDigite o usuário administrador:");
    if (user == null || user == "") return; // Cancela se estiver vazio

    let pass = prompt("Digite a senha administrativa:");
    if (pass == null || pass == "") return; // Cancela se estiver vazio

    // Envia os dados para a rota de validação no Flask
    window.location.href = `/login_admin_prompt?u=${user}&p=${pass}`;
}
</script>
</html>
