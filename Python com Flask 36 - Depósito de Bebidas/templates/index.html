<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Depósito de Bebidas - Cadastro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
            border-top: 8px solid #ff4757;
        }
        h2 { color: #2f3542; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #57606f; font-weight: bold; }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #eccc68;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #ffa502; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-save { background-color: #2ed573; }
        .btn-save:hover { background-color: #26af60; }
        .btn-view { background-color: #1e90ff; display: block; text-align: center; text-decoration: none; margin-top: 10px; width: 375px; }
        .btn-view:hover { background-color: #3742fa; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🍺 Cadastro de Bebidas</h2>
        <form action="/cadastrar" method="POST">
            <div class="form-group">
                <label>Nome da Bebida</label>
                <input type="text" name="nome" required placeholder="Ex: Guaraná Antártica">
            </div>
            <div class="form-group">
                <label>Fabricante</label>
                <input type="text" name="fabricante" required placeholder="Ex: Ambev">
            </div>
            <div class="form-group">
                <label>Quantidade em Estoque</label>
                <input type="number" name="quantidade" required min="0">
            </div>
            <button type="submit" class="btn btn-save">Cadastrar Produto</button>
            <a href="/estoque" class="btn btn-view">Ver Estoque Completo</a>
        </form>
    </div>
</body>
</html>
