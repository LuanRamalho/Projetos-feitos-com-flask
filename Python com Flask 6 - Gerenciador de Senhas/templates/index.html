<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cofre de Senhas</title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --primary: #4a69bd;
            --success: #2ecc71;
            --text-main: #2f3640;
            --text-muted: #7f8c8d;
            --border-color: #dcdde1;
            --radius: 8px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        h1 { margin-bottom: 25px; color: var(--primary); text-align: center; }

        .main-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 1rem;
            width: 100%;
        }

        .btn {
            padding: 12px 20px;
            border-radius: var(--radius);
            border: none;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-success { background: var(--success); color: white; grid-column: span 2; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gen { background: #f1c40f; color: #2f3640; margin-top: 20px; width: 100%; }

        .nav-bar {
            display: flex;
            gap: 10px;
            margin: 25px 0;
            padding: 20px 0;
            border-top: 1px solid var(--border-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            border-left: 6px solid var(--primary);
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .card h3 { color: var(--primary); margin-bottom: 8px; }
        .card p { color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cofre de Senhas</h1>
        
        <form action="/add" method="POST" class="main-form">
            <input type="text" name="site_name" placeholder="Nome do Site" required>
            <input type="text" name="url" placeholder="URL">
            <input type="text" name="user" placeholder="Usuário">
            <input type="password" name="password" placeholder="Senha">
            <button type="submit" class="btn btn-success">💾 Salvar Novo Site</button>
        </form>

        <div class="nav-bar">
            <form action="/" method="GET" style="display:flex; flex-grow:1; gap:10px;">
                <input type="text" name="search" placeholder="Buscar site pelo nome...">
                <button type="submit" class="btn btn-primary">Buscar</button>
            </form>
        </div>

        <div class="grid">
            {% for name, info in items.items() %}
            <div class="card" onclick="location.href='/details/{{ name }}'">
                <h3>{{ name }}</h3>
                <p>👤 {{ info.user }}</p>
                <small style="color:var(--text-muted)">🔗 {{ info.url }}</small>
            </div>
            {% endfor %}
        </div>
        
        <a href="/generator" class="btn btn-gen">✨ Abrir Gerador de Senhas</a>
    </div>
</body>
</html>
