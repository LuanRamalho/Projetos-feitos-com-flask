<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Paisagens</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        form input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
        .btn-add { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .btn-search { background-color: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #eee; border-radius: 8px; overflow: hidden; background: #fff; transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 15px; }
    </style>
</head>
<body>

<div class="container">
    <section>
        <h2> Registrar Nova Visita</h2>
        <form action="/add" method="POST">
            <input type="text" name="city" placeholder="Cidade" required>
            <input type="text" name="country" placeholder="País" required>
            <input type="text" name="landmark" placeholder="Ponto Turístico" required>
            <input type="url" name="image_url" placeholder="URL da Imagem" required>
            <button type="submit" class="btn-add">Adicionar à Lista</button>
        </form>
    </section>

    <section>
        <form action="/" method="GET">
            <input type="text" name="query" placeholder="Buscar ponto visitado..." value="{{ query }}" style="width: 70%;">
            <button type="submit" class="btn-search">🔍 Buscar</button>
        </form>
    </section>

    <div class="gallery">
        {% for item in landmarks %}
        <div class="card">
            <img src="{{ item.image_url }}" alt="{{ item.landmark }}">
            <div class="card-info">
                <strong style="font-size: 1.2em;">{{ item.landmark }}</strong>
                <p style="color: #666; margin: 5px 0;">{{ item.city }}, {{ item.country }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
