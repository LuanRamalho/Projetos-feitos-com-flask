<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Adicionar Produto</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .admin-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #333; text-align: center; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        input, textarea { 
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 8px; 
            font-size: 16px; box-sizing: border-box; transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; }
        
        button { 
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none; 
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #5b4cc4; transform: translateY(-2px); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #777; text-decoration: none; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2>Cadastrar Produto</h2>
        <form method="post">
            <div class="form-group"><input name="nome" placeholder="Nome do Produto" required></div>
            <div class="form-group"><textarea name="descricao" placeholder="Descrição Detalhada" rows="3" required></textarea></div>
            <div class="form-group"><input name="preco" type="number" step="0.01" placeholder="Preço (Ex: 99.90)" required></div>
            <div class="form-group"><input name="url_imagem" placeholder="URL da Imagem" required></div>
            <button type="submit">Adicionar ao Catálogo</button>
        </form>
        <a href="/" class="back-link">← Voltar para a Loja</a>
    </div>
</body>
<script>
    // Bloqueia a visualização até a verificação do JS
    document.documentElement.style.display = 'none';

    (function() {
        const user = "admin";
        const pass = "12345";

        if (prompt("Usuário Admin:") !== user || prompt("Senha Admin:") !== pass) {
            alert("Acesso negado!");
            window.location.href = "/";
        } else {
            document.documentElement.style.display = 'block';
        }
    })();
</script>
</html>
