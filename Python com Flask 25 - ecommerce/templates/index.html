<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Loja JSON</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; text-align: center; }
        .card img { max-width: 100%; height: 150px; object-fit: contain; }
        .carrinho { margin-top: 40px; padding: 20px; background: #eef; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>E-commerce Minimalista</h1>
    <a href="/admin">Acessar Painel Admin (Adicionar Produtos)</a>
    <hr>

    <div class="grid">
        {% for produto in produtos %}
        <div class="card">
            <img src="{{ produto.url_imagem }}" alt="{{ produto.nome }}">
            <h3>{{ produto.nome }}</h3>
            <p>{{ produto.descricao }}</p>
            <p><strong>R$ {{ "%.2f"|format(produto.preco) }}</strong></p>
            <input type="checkbox" class="produto-check" data-preco="{{ produto.preco }}"> Selecionar
        </div>
        {% endfor %}
    </div>

    <div class="carrinho">
        <h2>Seu Carrinho</h2>
        <p>Total: <strong>R$ <span id="total-valor">0.00</span></strong></p>
        
        <label>Valor Pago: R$ </label>
        <input type="number" id="valor-pago" step="0.01" placeholder="0.00">
        
        <p>Troco: <strong style="color: green;">R$ <span id="troco-valor">0.00</span></strong></p>
    </div>

    <script>
        const checkboxes = document.querySelectorAll('.produto-check');
        const totalDisplay = document.getElementById('total-valor');
        const pagoInput = document.getElementById('valor-pago');
        const trocoDisplay = document.getElementById('troco-valor');

        function calcularTudo() {
            let total = 0;
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    total += floatValue(cb.getAttribute('data-preco'));
                }
            });
            
            totalDisplay.innerText = total.toFixed(2);

            let pago = floatValue(pagoInput.value);
            let troco = pago - total;
            
            trocoDisplay.innerText = troco > 0 ? troco.toFixed(2) : "0.00";
        }

        function floatValue(val) {
            return parseFloat(val) || 0;
        }

        checkboxes.forEach(cb => cb.addEventListener('change', calcularTudo));
        pagoInput.addEventListener('input', calcularTudo);
    </script>
</body>
</html>
