<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema Acadêmico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; min-h-screen; display: flex; align-items: center; justify-content: center; }
        .form-card { background: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4">
    <div class="form-card p-8 rounded-xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Novo Cadastro</h2>
        
        {% with messages = get_flashed_messages() %}{% if messages %}
            {% for msg in messages %}<div class="bg-red-900/50 text-red-200 p-3 rounded mb-4 text-sm text-center">{{ msg }}</div>{% endfor %}
        {% endif %}{% endwith %}
        
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm mb-1 text-slate-400">Nome Completo</label>
                <input type="text" name="nome" placeholder="Digite o nome do aluno" required 
                    class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-blue-500 outline-none text-white transition">
            </div>

            <div>
                <label class="block text-sm mb-1 text-slate-400">Matrícula</label>
                <input type="text" name="matricula" placeholder="Ex: 2026001" required 
                    class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-blue-500 outline-none text-white transition">
            </div>
            
            <div class="relative">
                <label class="block text-sm mb-1 text-slate-400">Senha</label>
                <input type="password" name="senha" id="senha1" placeholder="••••••••" required 
                    class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-blue-500 outline-none text-white transition">
                <span class="absolute right-3 top-9 cursor-pointer opacity-50 hover:opacity-100" onclick="togglePass('senha1', this)">👁️</span>
            </div>
            
            <div class="relative">
                <label class="block text-sm mb-1 text-slate-400">Confirmar Senha</label>
                <input type="password" name="senha2" id="senha2" placeholder="••••••••" required 
                    class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-blue-500 outline-none text-white transition">
                <span class="absolute right-3 top-9 cursor-pointer opacity-50 hover:opacity-100" onclick="togglePass('senha2', this)">👁️</span>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition shadow-lg mt-2">Finalizar Cadastro</button>
        </form>
        <p class="mt-6 text-center text-slate-500"><a href="/" class="hover:text-blue-400 transition">Já tem conta? Faça Login</a></p>
    </div>

    <script>
        function togglePass(inputId, icon) {
            let input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "🙈";
            } else {
                input.type = "password";
                icon.textContent = "👁️";
            }
        }
    </script>
</body>
</html>
