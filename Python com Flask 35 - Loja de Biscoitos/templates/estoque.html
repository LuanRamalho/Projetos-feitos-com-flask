<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estoque de Biscoitos</title>
    <style>
        :root {
            --accent1: #FFE66D;
            --accent2: #FF6B6B;
            --accent3: #4ECDC4;
            --dark: #2F2F2F;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f0f0;
            padding: 2rem;
        }

        .header-actions {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            border: 3px solid var(--dark);
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .search-box { flex: 1; min-width: 200px; }

        .search-box input {
            width: 100%;
            padding: 8px;
            border: 2px solid var(--dark);
            border-radius: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border: 3px solid var(--dark);
            border-radius: 15px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:nth-child(odd) { background: var(--accent1); }
        .card:nth-child(even) { background: var(--accent3); }

        .card h3 { margin-top: 0; color: var(--dark); text-transform: uppercase; }

        .card-info { font-size: 0.9rem; margin-bottom: 1rem; }

        .badge {
            background: var(--dark);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        /* --- Novo visual do botão Editar --- */
        .btn-edit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            margin-top: 10px;
            margin-right: 8px; /* Pequeno espaçamento para o botão Remover */
            background-color: #2ecc71; /* Fundo Verde vibrante (Emerald) */
            color: white; /* Texto Branco para contraste */
            border: 2px solid #27ae60; /* Borda verde mais escura */
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1); /* Sombra inicial sutil */
        }

        /* Efeito ao passar o mouse */
        .btn-edit:hover {
            background-color: #27ae60; /* Escurece um pouco o verde */
            border-color: #219150;
            transform: translate(-2px, -2px); /* Efeito de elevação */
            box-shadow: 6px 6px 0px rgba(0,0,0,0.15); /* Sombra mais visível */
        }

        /* Efeito ao clicar */
        .btn-edit:active {
            transform: translate(2px, 2px); /* Efeito de 'pressionar' */
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .btn-delete {
            display: inline-block;
            margin-top: 10px;
            color: white;
            background: var(--accent2);
            padding: 5px 15px;
            text-decoration: none;
            border-radius: 5px;
            border: 2px solid var(--dark);
            font-weight: bold;
        }

        .btn-back {
            text-decoration: none;
            background: white;
            padding: 10px 20px;
            border: 3px solid var(--dark);
            color: var(--dark);
            font-weight: bold;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="header-actions">
        <form action="/estoque" method="GET" style="display: flex; gap: 10px; flex: 1;">
            <div class="search-box">
                <label>Nome:</label>
                <input type="text" name="nome" placeholder="Buscar por nome...">
            </div>
            <div class="search-box">
                <label>Fabricante:</label>
                <input type="text" name="fabricante" placeholder="Buscar por fabricante...">
            </div>
            <button type="submit" style="padding: 10px; background: var(--dark); color: white; border-radius: 5px; cursor: pointer;">🔍</button>
        </form>
        <a href="/" class="btn-back">➕ Novo Biscoito</a>
    </div>

    <div class="grid">
        {% for b in biscoitos %}
        <div class="card">
            <h3>{{ b.nome }}</h3>
            <div class="card-info">
                <p><strong>Fabricante:</strong> {{ b.fabricante }}</p>
                <p><strong>Estoque:</strong> <span class="badge">{{ b.quantidade }} un</span></p>
            </div>
            <div style="display: flex; gap: 10px;">
                <a href="/editar/{{ b.nome }}/{{ b.fabricante }}" class="btn-edit">Editar</a>
                <a href="/deletar/{{ b.nome }}/{{ b.fabricante }}" class="btn-delete" onclick="return confirm('Deseja excluir?')">Remover</a>
            </div>
        </div>
        {% else %}
        <p>Nenhum biscoito encontrado.</p>
        {% endfor %}
    </div>

</body>
</html>
