<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Editar' if faturamento else 'Novo' }} Faturamento</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 1.5em; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 0.9em; color: #7f8c8d; margin-bottom: 5px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #3498db; }
        .full-width { grid-column: span 2; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; color: #e74c3c; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>{{ 'Editar Faturamento - ' + faturamento.ano if faturamento else 'Cadastrar Novo Ano' }}</h1>
        
        <form method="POST">
            <div class="grid-inputs">
                <div class="field-group full-width">
                    <label>Ano (Ex: 2026)</label>
                    <input type="text" name="ano" value="{{ faturamento.ano if faturamento else '' }}" 
                           placeholder="Digite o ano..." required {{ 'readonly' if faturamento else '' }}>
                </div>

                {% set nomes_meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"] %}
                {% for i in range(1, 13) %}
                <div class="field-group">
                    <label>{{ nomes_meses[i-1] }} (R$)</label>
                    <input type="number" step="0.01" name="mes_{{ i }}" 
                        value="{{ faturamento.meses[i|string] if faturamento else '0.00' }}" required>
                </div>
                {% endfor %}
            </div>

            <button type="submit" class="btn-save">SALVAR DADOS</button>
            <a href="/" class="btn-cancel">Cancelar e Voltar</a>
        </form>
    </div>
</body>
</html>
