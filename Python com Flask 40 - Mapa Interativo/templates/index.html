<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interativo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #controls {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        #map { height: 100vh; width: 100%; }
        input { padding: 5px; width: 250px; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="controls">
        <input type="text" id="address" placeholder="Digite um endereço (ex: Av. Paulista, SP)">
        <button onclick="findLocation()">Buscar</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Inicializa o mapa focado no Brasil (ou coordenadas mundiais)
        const map = L.map('map').setView([-15.7801, -47.9292], 4);

        // Adiciona a camada de tiles do OpenStreetMap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let marker;

        async function findLocation() {
            const query = document.getElementById('address').value;
            if (!query) return;

            // Busca as coordenadas usando a API Nominatim (OpenStreetMap)
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const data = await response.json();

            if (data.length > 0) {
                const lat = data[0].lat;
                const lon = data[0].lon;

                // Move o mapa para o local encontrado
                map.setView([lat, lon], 16);

                // Remove marcador anterior se existir
                if (marker) map.removeLayer(marker);

                // Adiciona novo marcador
                marker = L.marker([lat, lon]).addTo(map)
                    .bindPopup(query)
                    .openPopup();
            } else {
                alert("Local não encontrado!");
            }
        }
    </script>
</body>
</html>
