<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Explorador de Planetas</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: #1e1e1e; border-radius: 10px; padding: 15px; width: 250px; text-align: center; border: 1px solid #333; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .card h2 { color: #4a9eff; }
        .info { text-align: left; font-size: 0.9em; margin-top: 10px; }
        strong { color: #aaa; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Planetas do Sistema Solar</h1>
    <div class="grid">
        {% for planeta in planetas %}
        <div class="card">
            <img src="{{ planeta.imagem }}" alt="{{ planeta.nome }}">
            <h2>{{ planeta.nome }}</h2>
            <div class="info">
                <p><strong>Rotação:</strong> {{ planeta.rotacao }}h</p>
                <p><strong>Translação:</strong> {{ planeta.translacao }} dias</p>
                <p><strong>Diâmetro:</strong> {{ planeta.diametro }} km</p>
                <p><strong>Temp:</strong> {{ planeta.temperatura }}°C</p>
                <p><strong>Distância:</strong> {{ planeta.distancia }} km</p>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
