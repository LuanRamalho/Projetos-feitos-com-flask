<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ action }} Receita</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #6a11cb; background: linear-gradient(to right, #2575fc, #6a11cb); color: white; }
        .form-container { background: white; color: #333; border-radius: 20px; padding: 40px; margin-top: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="col-md-8 form-container">
        <h2 class="text-center mb-4 fw-bold text-primary">{{ action }} Receita</h2>
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nome da Receita</label>
                    <input type="text" name="nome" class="form-control" value="{{ recipe.nome if recipe else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Categoria (ex: Sobremesa)</label>
                    <input type="text" name="categoria" class="form-control" value="{{ recipe.categoria if recipe else '' }}" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Ingredientes</label>
                <textarea name="ingredientes" class="form-control" rows="3" required>{{ recipe.ingredientes if recipe else '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Modo de Preparo</label>
                <textarea name="preparo" class="form-control" rows="3" required>{{ recipe.preparo if recipe else '' }}</textarea>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Tempo de Preparo</label>
                    <input type="text" name="tempo" class="form-control" placeholder="Ex: 40 min" value="{{ recipe.tempo if recipe else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Porções</label>
                    <input type="number" name="porcoes" class="form-control" value="{{ recipe.porcoes if recipe else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">URL da Imagem</label>
                    <input type="url" name="url_imagem" class="form-control" placeholder="https://..." value="{{ recipe.url_imagem if recipe else '' }}">
                </div>
            </div>
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg">Salvar Receita</button>
                <a href="/" class="btn btn-light">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
