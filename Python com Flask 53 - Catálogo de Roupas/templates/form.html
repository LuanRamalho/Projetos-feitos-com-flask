{% extends "base.html" %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">{{ 'Editar Roupa' if action=='edit' else 'Adicionar Roupa' }}</h5>
          <form method="post">
            <div class="mb-3">
              <label class="form-label">Nome</label>
              <input class="form-control" name="name" required value="{{ item.get('name','') }}">
            </div>
            <div class="mb-3">
              <label class="form-label">Marca</label>
              <input class="form-control" name="brand" value="{{ item.get('brand','') }}">
            </div>
            <div class="mb-3">
              <label class="form-label">Tipo</label>
              <input class="form-control" name="type" value="{{ item.get('type','') }}">
            </div>
            <div class="mb-3">
              <label class="form-label">Cor</label>
              <input class="form-control" name="color" value="{{ item.get('color','') }}">
            </div>
            <div class="mb-3">
              <label class="form-label">Tamanho</label>
              <input class="form-control" name="size" value="{{ item.get('size','') }}" placeholder="Ex: P, M, G, 38, 40">
              <div class="form-text">Informe o tamanho da roupa (ex: P, M, G, 38, 40).</div>
            </div>
            <div class="mb-3">
              <label class="form-label">URL da imagem</label>
              <input class="form-control" name="url" value="{{ item.get('url','') }}" placeholder="https://...">
              <div class="form-text">O link será exibido como imagem no card.</div>
            </div>
            <div class="d-flex justify-content-between">
              <a class="btn btn-secondary" href="{{ url_for('index') }}">Cancelar</a>
              <button class="btn btn-primary" type="submit">{{ 'Salvar' if action=='edit' else 'Criar' }}</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
