<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { color: #f5576c; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #f1f2f6; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #f5576c; color: white; font-weight: bold; cursor: pointer; }
        .result-box { background: #f1f2f6; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #f5576c; color: #2f3542; font-weight: bold; word-break: break-all; }
        .btn-back { background: #2f3542; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Recuperação</h2>
        <p style="color: #57606f; font-size: 0.9rem;">Informe seu usuário para ver as credenciais.</p>
        
        <form method="POST">
            <input type="text" name="username" placeholder="Seu nome de usuário" required>
            <button type="submit">RECUPERAR AGORA</button>
        </form>

        {% if info_recuperada %}
            <div class="result-box">
                {{ info_recuperada }}
            </div>
        {% endif %}

        <a href="/"><button class="btn-back">VOLTAR AO LOGIN</button></a>
    </div>
</body>
</html>
