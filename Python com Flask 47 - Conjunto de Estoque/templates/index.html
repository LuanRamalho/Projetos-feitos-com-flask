<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Gerenciador de Estoque</title>
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2>Gestão de Comércios</h2>
    
    <div class="card p-3 mb-4">
        <form action="/add_store" method="POST" class="row g-3">
            <div class="col-auto">
                <input type="text" name="name" class="form-control" placeholder="Nome da Loja" required>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">Adicionar Loja</button>
            </div>
        </form>
    </div>

    <form method="GET" class="mb-4">
        <input type="text" name="search" class="form-control" placeholder="Buscar loja pelo nome...">
    </form>

    <div class="row">
        {% for store in stores %}
        <div class="col-md-4 mb-3">
            <div class="card h-100 shadow-sm">
                <div class="card-body" onclick="location.href='/store/{{ store.id }}';" style="cursor: pointer;">
                    <h5 class="card-title">{{ store.name }}</h5>
                    <p class="text-muted">Produtos cadastrados: {{ store.products|length }}</p>
                </div>
                <div class="card-footer d-flex justify-content-between">
                    <button class="btn btn-sm btn-warning" data-bs-toggle="modal" data-bs-target="#edit{{ store.id }}">Editar</button>
                    <a href="/delete_store/{{ store.id }}" class="btn btn-sm btn-danger">Excluir</a>
                </div>
            </div>
        </div>

        <div class="modal fade" id="edit{{ store.id }}" tabindex="-1">
            <div class="modal-dialog">
                <form action="/edit_store/{{ store.id }}" method="POST" class="modal-content">
                    <div class="modal-header"><h5>Editar Nome</h5></div>
                    <div class="modal-body">
                        <input type="text" name="name" value="{{ store.name }}" class="form-control" required>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
