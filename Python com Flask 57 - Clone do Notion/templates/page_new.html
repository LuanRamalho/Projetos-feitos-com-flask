{% extends "base.html" %}
{% block title %}Nova página{% endblock %}
{% block content %}
<section class="editor-header">
  <div>
    <p class="eyebrow">Nova página</p>
    <h1>Criar uma página</h1>
    <p class="muted">Comece com uma estrutura simples e expanda depois com blocos.</p>
  </div>
</section>

<div class="editor-card glass">
  <form method="post" class="editor-form">
    <label>Título da página</label>
    <input type="text" name="title" placeholder="Ex.: Projeto Flask" required>
    <button class="primary-btn" type="submit">Criar página</button>
  </form>
</div>
{% endblock %}
