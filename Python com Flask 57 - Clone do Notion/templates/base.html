<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Clone do Notion{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  {% if session.get('user') %}
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="workspace-badge">N</div>
      <div>
        <div class="workspace-title">Workspace</div>
        <div class="workspace-user">{{ session.get('user') }}</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('dashboard') }}">Painel</a>
      <a href="{{ url_for('new_page') }}">Nova página</a>
      <a href="{{ url_for('logout') }}">Sair</a>
    </nav>

    <div class="sidebar-note">
      <span>Arquitetura lite:</span>
      <p>Login, páginas, blocos e JSON como banco.</p>
    </div>
  </aside>
  {% endif %}

  <main class="app-shell {% if session.get('user') %}with-sidebar{% endif %}">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
