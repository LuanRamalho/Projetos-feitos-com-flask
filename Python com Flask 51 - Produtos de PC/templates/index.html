<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Hardware</title>
    <style>
        :root { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f4f9; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; }
        
        /* Tabs */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; }
        .tab-btn { background: #ddd; border: none; padding: 10px 20px; cursor: pointer; font-size: 16px; margin: 0 5px; border-radius: 5px 5px 0 0; }
        .tab-btn.active { background: #007bff; color: white; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        
        /* Forms */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button.action-btn { background: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
        button.action-btn:hover { background: #218838; }
        
        /* Search */
        .search-bar { margin: 20px 0; display: flex; gap: 10px; }
        
        /* Cards Layout */
        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 200px; object-fit: contain; background: #f9f9f9; border-radius: 4px; margin-bottom: 10px; }
        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .card-subtitle { font-size: 14px; color: #666; margin-bottom: 10px; }
        .card-details p { margin: 5px 0; font-size: 14px; }
        .card-actions { margin-top: 15px; display: flex; gap: 10px; }
        .btn-edit { background: #ffc107; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

    <h1>Gestão de Inventário</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('tab-pcs')">PCs</button>
        <button class="tab-btn" onclick="openTab('tab-produtos')">Outros Produtos</button>
    </div>

    <div id="tab-pcs" class="tab-content active">
        <h2>Cadastrar / Editar PC</h2>
        <form id="form-pc">
            <div class="form-group"><label>Fabricante</label><input type="text" id="pc-fab" required></div>
            <div class="form-group"><label>Modelo</label><input type="text" id="pc-mod" required></div>
            <div class="form-group"><label>Velocidade do Processador (GHz)</label><input type="number" id="pc-vel" step="0.01" required></div>
            <div class="form-group"><label>Núcleos</label>
                <select id="pc-nuc">
                    <option value="4">4</option><option value="6">6</option><option value="8">8</option>
                    <option value="10">10</option><option value="12">12</option><option value="16">16</option>
                </select>
            </div>
            <div class="form-group"><label>RAM</label>
                <select id="pc-ram">
                    <option value="4 GB">4 GB</option><option value="8 GB">8 GB</option>
                    <option value="16 GB">16 GB</option><option value="32 GB">32 GB</option>
                </select>
            </div>
            <div class="form-group"><label>SSD</label>
                <select id="pc-ssd">
                    <option value="128 GB">128 GB</option><option value="256 GB">256 GB</option>
                    <option value="512 GB">512 GB</option><option value="1 TB">1 TB</option>
                </select>
            </div>
            <div class="form-group"><label>URL da Imagem</label><input type="url" id="pc-img" required></div>
            <button type="submit" class="action-btn">Salvar PC</button>
            <button type="button" class="action-btn" style="background:#6c757d;" onclick="resetPCForm()">Cancelar</button>
        </form>

        <div class="search-bar">
            <input type="text" id="search-pc-fab" placeholder="Buscar por Fabricante..." onkeyup="loadPCs()">
            <input type="text" id="search-pc-mod" placeholder="Buscar por Modelo..." onkeyup="loadPCs()">
        </div>
        
        <div id="cards-pcs" class="card-container"></div>
    </div>

    <div id="tab-produtos" class="tab-content">
        <h2>Cadastrar / Editar Produto</h2>
        <form id="form-produto">
            <div class="form-group"><label>Nome</label><input type="text" id="prod-nome" required></div>
            <div class="form-group"><label>Fabricante</label><input type="text" id="prod-fab" required></div>
            <div class="form-group"><label>Descrição</label><input type="text" id="prod-desc" required></div>
            <div class="form-group"><label>URL da Imagem</label><input type="url" id="prod-img" required></div>
            <button type="submit" class="action-btn">Salvar Produto</button>
            <button type="button" class="action-btn" style="background:#6c757d;" onclick="resetProdForm()">Cancelar</button>
        </form>

        <div class="search-bar">
            <input type="text" id="search-prod-nome" placeholder="Buscar por Nome..." onkeyup="loadProdutos()">
            <input type="text" id="search-prod-fab" placeholder="Buscar por Fabricante..." onkeyup="loadProdutos()">
        </div>

        <div id="cards-produtos" class="card-container"></div>
    </div>

    <script>
        let editingPC = null;
        let editingProduto = null;

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- LÓGICA DE PCs ---
        async function loadPCs() {
            const res = await fetch('/api/pcs');
            let pcs = await res.json();
            
            const searchFab = document.getElementById('search-pc-fab').value.toLowerCase();
            const searchMod = document.getElementById('search-pc-mod').value.toLowerCase();
            
            pcs = pcs.filter(pc => 
                pc.fabricante.toLowerCase().includes(searchFab) && 
                pc.modelo.toLowerCase().includes(searchMod)
            );

            const container = document.getElementById('cards-pcs');
            container.innerHTML = '';
            
            pcs.forEach(pc => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${pc.imagem_url}" alt="${pc.modelo}" onerror="this.src='https://via.placeholder.com/300x200?text=Sem+Imagem'">
                        <div class="card-title">${pc.modelo}</div>
                        <div class="card-subtitle">${pc.fabricante}</div>
                        <div class="card-details">
                            <p><strong>CPU:</strong> ${pc.velocidade} GHz (${pc.nucleos} Cores)</p>
                            <p><strong>RAM:</strong> ${pc.ram}</p>
                            <p><strong>SSD:</strong> ${pc.ssd}</p>
                        </div>
                        <div class="card-actions">
                            <button class="btn-edit" onclick="editPC('${pc.fabricante}', '${pc.modelo}', ${pc.velocidade}, ${pc.nucleos}, '${pc.ram}', '${pc.ssd}', '${pc.imagem_url}')">Editar</button>
                            <button class="btn-delete" onclick="deletePC('${pc.fabricante}', '${pc.modelo}')">Excluir</button>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('form-pc').addEventListener('submit', async (e) => {
            e.preventDefault();
            const new_data = {
                fabricante: document.getElementById('pc-fab').value,
                modelo: document.getElementById('pc-mod').value,
                velocidade: parseFloat(document.getElementById('pc-vel').value),
                nucleos: parseInt(document.getElementById('pc-nuc').value),
                ram: document.getElementById('pc-ram').value,
                ssd: document.getElementById('pc-ssd').value,
                imagem_url: document.getElementById('pc-img').value
            };

            if (editingPC) {
                await fetch('/api/pcs/update', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ old_fabricante: editingPC.fabricante, old_modelo: editingPC.modelo, new_data })
                });
                editingPC = null;
            } else {
                await fetch('/api/pcs', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(new_data)
                });
            }
            resetPCForm();
            loadPCs();
        });

        function editPC(fab, mod, vel, nuc, ram, ssd, img) {
            document.getElementById('pc-fab').value = fab;
            document.getElementById('pc-mod').value = mod;
            document.getElementById('pc-vel').value = vel;
            document.getElementById('pc-nuc').value = nuc;
            document.getElementById('pc-ram').value = ram;
            document.getElementById('pc-ssd').value = ssd;
            document.getElementById('pc-img').value = img;
            editingPC = { fabricante: fab, modelo: mod };
            window.scrollTo(0, 0);
        }

        async function deletePC(fab, mod) {
            if(confirm('Tem certeza que deseja excluir?')) {
                await fetch('/api/pcs/delete', {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ fabricante: fab, modelo: mod })
                });
                loadPCs();
            }
        }

        function resetPCForm() {
            document.getElementById('form-pc').reset();
            editingPC = null;
        }

        // --- LÓGICA DE PRODUTOS ---
        async function loadProdutos() {
            const res = await fetch('/api/produtos');
            let prods = await res.json();
            
            const searchNome = document.getElementById('search-prod-nome').value.toLowerCase();
            const searchFab = document.getElementById('search-prod-fab').value.toLowerCase();
            
            prods = prods.filter(p => 
                p.nome.toLowerCase().includes(searchNome) && 
                p.fabricante.toLowerCase().includes(searchFab)
            );

            const container = document.getElementById('cards-produtos');
            container.innerHTML = '';
            
            prods.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${p.imagem_url}" alt="${p.nome}" onerror="this.src='https://via.placeholder.com/300x200?text=Sem+Imagem'">
                        <div class="card-title">${p.nome}</div>
                        <div class="card-subtitle">${p.fabricante}</div>
                        <div class="card-details">
                            <p>${p.descricao}</p>
                        </div>
                        <div class="card-actions">
                            <button class="btn-edit" onclick="editProduto('${p.nome}', '${p.fabricante}', '${p.descricao}', '${p.imagem_url}')">Editar</button>
                            <button class="btn-delete" onclick="deleteProduto('${p.nome}', '${p.fabricante}')">Excluir</button>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('form-produto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const new_data = {
                nome: document.getElementById('prod-nome').value,
                fabricante: document.getElementById('prod-fab').value,
                descricao: document.getElementById('prod-desc').value,
                imagem_url: document.getElementById('prod-img').value
            };

            if (editingProduto) {
                await fetch('/api/produtos/update', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ old_nome: editingProduto.nome, old_fabricante: editingProduto.fabricante, new_data })
                });
                editingProduto = null;
            } else {
                await fetch('/api/produtos', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(new_data)
                });
            }
            resetProdForm();
            loadProdutos();
        });

        function editProduto(nome, fab, desc, img) {
            document.getElementById('prod-nome').value = nome;
            document.getElementById('prod-fab').value = fab;
            document.getElementById('prod-desc').value = desc;
            document.getElementById('prod-img').value = img;
            editingProduto = { nome: nome, fabricante: fab };
            window.scrollTo(0, 0);
        }

        async function deleteProduto(nome, fab) {
            if(confirm('Tem certeza que deseja excluir?')) {
                await fetch('/api/produtos/delete', {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nome: nome, fabricante: fab })
                });
                loadProdutos();
            }
        }

        function resetProdForm() {
            document.getElementById('form-produto').reset();
            editingProduto = null;
        }

        // Inicializar
        loadPCs();
        loadProdutos();
    </script>
</body>
</html>
